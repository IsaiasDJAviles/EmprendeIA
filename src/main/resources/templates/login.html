<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Iniciar sesión - EmprendeIA</title>
</head>
<body>
<h1>Iniciar sesión</h1>

<p th:if="${param.error}">Correo o contraseña incorrectos.</p>
<p th:if="${param.logout}">Sesión cerrada correctamente.</p>
<p th:if="${param.registrado}">Cuenta creada. Ahora puedes iniciar sesión.</p>

<form th:action="@{/login}" method="post">
    <div>
        <label for="correo">Correo</label>
        <input type="email" id="correo" name="correo" required>
    </div>
    <div>
        <label for="contrasena">Contraseña</label>
        <input type="password" id="contrasena" name="contrasena" required>
    </div>
    <button type="submit">Entrar</button>
</form>

<p><a th:href="@{/registro}">Crear una cuenta</a></p>
</body>
</html>
