<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Iniciar sesión - EmprendeIA</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="auth-shell">
    <div class="auth-card">
        <div class="app-brand">EmprendeIA</div>
        <p class="auth-subtitle">Inicia sesión para continuar</p>

        <p class="alert alert-error" th:if="${param.error}">Correo o contraseña incorrectos.</p>
        <p class="alert alert-info" th:if="${param.logout}">Sesión cerrada correctamente.</p>
        <p class="alert alert-info" th:if="${param.registrado}">Cuenta creada. Ahora puedes iniciar sesión.</p>

        <form id="form-login" th:action="@{/login}" method="post" novalidate>
            <div class="form-group">
                <label for="correo">Correo</label>
                <input type="email" id="correo" name="correo" required>
                <p class="field-error" data-error-for="correo"></p>
            </div>
            <div class="form-group">
                <label for="contrasena">Contraseña</label>
                <input type="password" id="contrasena" name="contrasena" required>
                <p class="field-error" data-error-for="contrasena"></p>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Entrar</button>
        </form>

        <p class="auth-footer"><a th:href="@{/registro}">Crear una cuenta</a></p>
    </div>
</div>
<script th:src="@{/js/validacion.js}"></script>
</body>
</html>
