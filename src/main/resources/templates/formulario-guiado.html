<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Formulario guiado - EmprendeIA</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<div class="page">
    <div class="page-header">
        <div>
            <h1>Formulario guiado</h1>
            <p>Datos financieros de tu idea</p>
        </div>
    </div>

    <div class="card">
        <form th:action="@{/ideas/{id}/formulario(id=${ideaId})}" th:object="${formularioForm}" method="post">
            <div class="form-group">
                <label for="inversionInicial">Inversión inicial</label>
                <input type="number" step="0.01" id="inversionInicial" th:field="*{inversionInicial}">
                <p class="field-error" th:if="${#fields.hasErrors('inversionInicial')}" th:errors="*{inversionInicial}"></p>
            </div>
            <div class="form-group">
                <label for="costosFijos">Costos fijos</label>
                <input type="number" step="0.01" id="costosFijos" th:field="*{costosFijos}">
                <p class="field-error" th:if="${#fields.hasErrors('costosFijos')}" th:errors="*{costosFijos}"></p>
            </div>
            <div class="form-group">
                <label for="costosVariables">Costos variables</label>
                <input type="number" step="0.01" id="costosVariables" th:field="*{costosVariables}">
                <p class="field-error" th:if="${#fields.hasErrors('costosVariables')}" th:errors="*{costosVariables}"></p>
            </div>
            <div class="form-group">
                <label for="precioVenta">Precio de venta</label>
                <input type="number" step="0.01" id="precioVenta" th:field="*{precioVenta}">
                <p class="field-error" th:if="${#fields.hasErrors('precioVenta')}" th:errors="*{precioVenta}"></p>
            </div>
            <div class="form-group">
                <label for="unidadesEstimadas">Unidades estimadas</label>
                <input type="number" id="unidadesEstimadas" th:field="*{unidadesEstimadas}">
                <p class="field-error" th:if="${#fields.hasErrors('unidadesEstimadas')}" th:errors="*{unidadesEstimadas}"></p>
            </div>
            <div class="form-group">
                <label for="destinoInversion">Destino de la inversión</label>
                <textarea id="destinoInversion" th:field="*{destinoInversion}"></textarea>
                <p class="field-error" th:if="${#fields.hasErrors('destinoInversion')}" th:errors="*{destinoInversion}"></p>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Guardar</button>
                <a class="btn btn-secondary" th:href="@{/dashboard}">Volver</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
