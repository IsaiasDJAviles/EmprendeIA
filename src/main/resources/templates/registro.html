<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Crear cuenta - EmprendeIA</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="auth-shell">
    <div class="auth-card">
        <div class="app-brand">EmprendeIA</div>
        <p class="auth-subtitle">Crea tu cuenta para empezar</p>

        <form th:action="@{/registro}" th:object="${registroForm}" method="post">
            <div class="form-group">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" th:field="*{nombre}">
                <p class="field-error" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></p>
            </div>
            <div class="form-group">
                <label for="apellidoPaterno">Apellido paterno</label>
                <input type="text" id="apellidoPaterno" th:field="*{apellidoPaterno}">
                <p class="field-error" th:if="${#fields.hasErrors('apellidoPaterno')}" th:errors="*{apellidoPaterno}"></p>
            </div>
            <div class="form-group">
                <label for="apellidoMaterno">Apellido materno</label>
                <input type="text" id="apellidoMaterno" th:field="*{apellidoMaterno}">
                <p class="field-error" th:if="${#fields.hasErrors('apellidoMaterno')}" th:errors="*{apellidoMaterno}"></p>
            </div>
            <div class="form-group">
                <label for="correo">Correo</label>
                <input type="email" id="correo" th:field="*{correo}">
                <p class="field-error" th:if="${#fields.hasErrors('correo')}" th:errors="*{correo}"></p>
            </div>
            <div class="form-group">
                <label for="contrasena">Contraseña</label>
                <input type="password" id="contrasena" th:field="*{contrasena}">
                <p class="field-error" th:if="${#fields.hasErrors('contrasena')}" th:errors="*{contrasena}"></p>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Registrarme</button>
        </form>

        <p class="auth-footer"><a th:href="@{/login}">Ya tengo cuenta</a></p>
    </div>
</div>
</body>
</html>
