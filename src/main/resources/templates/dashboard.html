<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mis ideas - EmprendeIA</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<div class="page">
    <div class="page-header">
        <div>
            <h1>Mis ideas de negocio</h1>
            <p>Ideas registradas con tu cuenta</p>
        </div>
        <a class="btn btn-primary" th:href="@{/ideas/nueva}">+ Nueva idea</a>
    </div>

    <p class="alert alert-error" th:if="${param.error}">La idea solicitada no existe o no te pertenece.</p>

    <div class="empty-state" th:if="${#lists.isEmpty(ideas)}">
        Todavía no tienes ideas registradas. <a th:href="@{/ideas/nueva}">Crea la primera</a>.
    </div>

    <div class="table-wrap" th:unless="${#lists.isEmpty(ideas)}">
        <table>
            <thead>
            <tr>
                <th>Nombre</th>
                <th>Sector</th>
                <th>Nivel de avance</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="idea : ${ideas}">
                <td th:text="${idea.nombreNegocio}"></td>
                <td th:text="${idea.sectorMercado}"></td>
                <td th:text="${idea.nivelAvance}"></td>
                <td><a th:href="@{/ideas/{id}/formulario(id=${idea.id})}">Formulario guiado →</a></td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
