spring.application.name=emprendeia

# Puerto HTTP: Render inyecta PORT y espera que la app escuche ahi; en local dev seguimos
# respetando SERVER_PORT (ver run-local.ps1) si PORT no esta definido; 8080 como ultimo default.
server.port=${PORT:${SERVER_PORT:8080}}

# RF-02: timeout de sesion configurable, 30 minutos por defecto
server.servlet.session.timeout=${SESSION_TIMEOUT:30m}

# Datasource: credenciales de emprendeia_app (ver db/emprendeia_roles.sql), nunca hardcodeadas.
# sslmode por defecto en "prefer" para desarrollo local; en produccion (Render) fijar DB_SSLMODE=require.
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:emprendeia}?sslmode=${DB_SSLMODE:prefer}
spring.datasource.username=${DB_APP_USERNAME}
spring.datasource.password=${DB_APP_PASSWORD}

# emprendeia_app no tiene privilegio DDL: Hibernate solo valida el esquema contra las entidades, nunca lo modifica.
spring.jpa.hibernate.ddl-auto=validate
llm.provider=gemini
llm.gemini.api-key=${GEMINI_API_KEY}
llm.gemini.model=gemini-flash-latest
llm.gemini.base-url=https://generativelanguage.googleapis.com/v1beta